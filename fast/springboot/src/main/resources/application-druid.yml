# 数据源配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 将fast换成你创建的数据库名称
    url:  jdbc:mysql://localhost:3306/fast?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root          # 这里填你的mysql的用户名
    password:   # 这里填你的mysql的密码
